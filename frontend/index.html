<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fill The Gaps</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-elements">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
    </div>

    <main class="glass-panel" id="app-container">
        <!-- Landing Screen -->
        <section id="screen-landing" class="screen active">
            <h1 class="title">FILL THE <span class="text-orange">GAPS</span></h1>
            <p class="subtitle">Can you guess the word before time runs out?</p>



            <button id="btn-start" class="btn-primary">START GAME</button>
        </section>

        <!-- Gameplay Screen -->
        <section id="screen-gameplay" class="screen">
            <header class="game-header">
                <div class="timer-box">
                    <span class="icon">⏱</span> <span id="timer">120</span>s
                </div>
                <div class="score-box">
                    <span class="icon">⭐</span> <span id="score">0</span>
                </div>
            </header>

            <div class="game-board">
                <div id="word-display" class="word-display">
                    <!-- Letters will be injected here -->
                </div>
            </div>

            <div class="input-area">
                <form id="guess-form" autocomplete="off">
                    <input type="text" id="word-input" class="word-input" placeholder="Type the full word..." autofocus>
                    <button type="submit" class="btn-secondary">Submit</button>
                </form>
            </div>

            <div id="feedback-message" class="feedback-message"></div>
        </section>

        <!-- Game Over Screen -->
        <section id="screen-gameover" class="screen">
            <h2 class="title text-orange">TIME'S UP!</h2>
            <div class="final-score">
                <p>You scored</p>
                <div class="score-circle">
                    <span id="final-score-value">0</span>
                </div>
                <p>points</p>
            </div>
            <button id="btn-restart" class="btn-primary">PLAY AGAIN</button>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
